<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Brin AR</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,sans-serif}

#loading{
  position:fixed;inset:0;background:#0a0804;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;z-index:999;
}
.logo{font-size:2rem;font-weight:300;color:#FAF6EE;letter-spacing:0.05em}
.logo em{color:#C9A84C;font-style:italic}
.bar-wrap{width:160px;height:2px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,#C9A84C,#E8C97A);animation:ld 3s ease-in-out forwards}
@keyframes ld{0%{width:0}70%{width:80%}100%{width:100%}}
.msg{font-size:0.68rem;color:#444;letter-spacing:0.08em}

#hud{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity 0.8s}
#hud.show{opacity:1}
.logo-hud{position:absolute;top:max(20px,env(safe-area-inset-top));left:20px;
  font-size:1rem;color:white;font-weight:300;text-shadow:0 1px 8px rgba(0,0,0,0.9)}
.logo-hud em{color:#C9A84C;font-style:italic}
.chip{position:absolute;top:max(20px,env(safe-area-inset-top));right:20px;
  background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);
  border-radius:20px;padding:4px 12px;font-size:0.62rem;color:#C9A84C;
  letter-spacing:0.1em;backdrop-filter:blur(8px)}
#status{position:absolute;bottom:max(120px,env(safe-area-inset-bottom,0px) + 100px);
  left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:8px 22px;font-size:0.72rem;color:rgba(255,255,255,0.8);
  letter-spacing:0.04em;backdrop-filter:blur(10px);white-space:nowrap;transition:all 0.4s}
#status.found{background:rgba(201,168,76,0.2);border-color:rgba(201,168,76,0.5);color:#E8C97A}

/* Fisher overlay — CSS animated, no WebGL */
#fisher-overlay{
  position:fixed;inset:0;z-index:30;pointer-events:none;
  display:none;
}
#fisher-wrap{
  position:absolute;
  width:180px;height:180px;
  bottom:25%;right:10%;
  transform-origin:bottom right;
}
#fisher-img{
  width:100%;height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity 1.5s ease;
  filter:grayscale(100%);
}
#fisher-img.appear{opacity:1}
#fisher-img.colorize{
  filter:grayscale(0%);
  transition:filter 1.8s ease, opacity 1.5s ease;
}
#fisher-img.float{
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-8px) rotate(-0.8deg)}
}
@keyframes linePull{
  0%{transform:rotate(0deg)}
  40%{transform:rotate(-6deg) translateX(-3px)}
  100%{transform:rotate(-4deg) translateX(-2px)}
}
@keyframes fall{
  0%{transform:rotate(-4deg) translateX(-2px)}
  30%{transform:rotate(-30deg) translateX(-15px) translateY(-5px)}
  70%{transform:rotate(-80deg) translateX(-30px) translateY(10px)}
  100%{transform:rotate(-90deg) translateX(-35px) translateY(20px);opacity:0.2}
}

/* Ripple rings */
#ripples{position:absolute;bottom:15%;right:18%;width:60px;height:30px;opacity:0;transition:opacity 0.5s}
#ripples.show{opacity:1}
.ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  border:1px solid rgba(120,200,230,0.5);
  border-radius:50%;
  animation:ripple 2.5s ease-out infinite;
}
.ring:nth-child(1){width:20px;height:10px;animation-delay:0s}
.ring:nth-child(2){width:36px;height:16px;animation-delay:0.7s}
.ring:nth-child(3){width:52px;height:22px;animation-delay:1.4s}
@keyframes ripple{
  0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.8}
  100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}
}

/* Test button */
#btn-test{
  position:fixed;bottom:max(50px,env(safe-area-inset-bottom,0px) + 30px);
  left:50%;transform:translateX(-50%);
  pointer-events:all;z-index:200;
  background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.5);
  color:#E8C97A;border-radius:20px;padding:8px 20px;
  font-size:11px;cursor:pointer;letter-spacing:0.08em;
  backdrop-filter:blur(8px);display:none;
}
</style>
</head>

  <div class="logo">Bri<em>n</em></div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="msg" id="msg">Chargement AR...</div>
</div>

<div id="hud">
  <div class="logo-hud">Bri<em>n</em></div>
  <div class="chip" id="chip">AR LIVE</div>
  <div id="status">Pointez vers le pêcheur</div>
</div>

    <div class="ring"></div>

<button id="btn-test" onclick="triggerAnimation()">Tester animation</button>

<!-- MindAR scene — detection only, no 3D rendering -->
<a-scene
  mindar-image="imageTargetSrc:./targets.mind; autoStart:false; uiLoading:no; uiScanning:no; uiError:no; filterMinCF:0.0001; filterBeta:10000; missTolerance:10; warmupTolerance:1;"
  color-space="sRGB"
  renderer="colorManagement:true"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  id="ar-scene"
  style="display:none;position:fixed;inset:0;z-index:1">
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
  <a-entity id="target" mindar-image-target="targetIndex:0">
    <!-- Invisible marker — detection only -->
    <a-plane width="1" height="1" material="opacity:0" transparent="true"></a-plane>
  </a-entity>
</a-scene>

<script>
let animRunning = false;
let animTimers = [];

// Loading messages
const msgs = ['Chargement AR...','Préparation...','Démarrage caméra...'];
let mi = 0;
const msgEl = document.getElementById('msg');
const msgInt = setInterval(()=>{ if(++mi<msgs.length) msgEl.textContent=msgs[mi]; },900);

// Scene ready
document.querySelector('a-scene').addEventListener('loaded', ()=>{
  clearInterval(msgInt);
  msgEl.textContent = 'Prêt !';
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    document.querySelector('a-scene').style.display='block';
    document.getElementById('hud').classList.add('show');
    document.getElementById('fisher-overlay').style.display='block';
    document.getElementById('btn-test').style.display='block';
    document.querySelector('a-scene').systems['mindar-image-system'].start();
  }, 600);
});

// Target detection
document.querySelector('#target').addEventListener('targetFound', ()=>{
  document.getElementById('status').textContent = '✓ Pêcheur détecté';
  document.getElementById('status').classList.add('found');
  document.getElementById('chip').textContent = 'DÉTECTÉ ✓';
  if(!animRunning) triggerAnimation();
});

document.querySelector('#target').addEventListener('targetLost', ()=>{
  document.getElementById('status').textContent = 'Pointez vers le pêcheur';
  document.getElementById('status').classList.remove('found');
  document.getElementById('chip').textContent = 'AR LIVE';
});

// CSS Animation sequence
function triggerAnimation(){
  if(animRunning) return;
  animRunning = true;
  animTimers.forEach(clearTimeout);
  animTimers = [];

  const img = document.getElementById('fisher-img');
  const wrap = document.getElementById('fisher-wrap');
  const ripples = document.getElementById('ripples');

  // Reset
  img.className = '';
  img.style.animation = '';
  wrap.style.animation = '';
  ripples.classList.remove('show');

  // 1. Appear (0s)
  t(100, ()=>{
    img.classList.add('appear');
  });

  // 2. Colors fill in (1.5s)
  t(1500, ()=>{
    img.classList.add('colorize');
  });

  // 3. Float gently (2.5s)
  t(2500, ()=>{
    img.classList.add('float');
    ripples.classList.add('show');
  });

  // 4. Line tension (6s)
  t(6000, ()=>{
    img.style.animation = 'linePull 0.8s ease forwards';
  });

  // 5. Hold tension (7s)
  t(7000, ()=>{
    img.style.animation = 'linePull 0.8s ease forwards, float 0.4s ease-in-out infinite';
  });

  // 6. Fish appears then slips (8s) — the poetic moment
  t(8000, ()=>{
    img.style.animation = 'none';
    // Slow release back to float
    img.style.transition = 'transform 1.5s ease';
    img.style.transform = 'rotate(0deg)';
  });

  t(9500, ()=>{
    img.style.transform = '';
    img.style.transition = '';
    img.classList.add('float');
  });

  // 7. Loop after 12s
  t(12000, ()=>{
    animRunning = false;
    // Will retrigger if target still found
  });
}

function t(ms, fn){ animTimers.push(setTimeout(fn, ms)); }

window.addEventListener('error', e => console.log('[BRIN]', e.message));
</script>
</body>
</html>
